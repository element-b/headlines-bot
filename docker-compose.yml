services:
  postgres:
    image: postgres:16-alpine
    container_name: headlines-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: headlines
      POSTGRES_USER: headlines
      POSTGRES_PASSWORD: headlines
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U headlines -d headlines"]
      interval: 5s
      timeout: 5s
      retries: 20

  headlines-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: headlines-bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: